<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fraud Detection Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

    /* ── AUTH SCREEN ── */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0f1117;
    }
    .auth-box {
      background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 12px;
      padding: 40px; width: 360px; text-align: center;
    }
    .auth-box h1 { font-size: 22px; margin-bottom: 6px; color: #fff; }
    .auth-box p { color: #888; font-size: 13px; margin-bottom: 28px; }
    .auth-box input {
      width: 100%; padding: 10px 14px; margin-bottom: 14px;
      background: #0f1117; border: 1px solid #2a2d3e; border-radius: 8px;
      color: #e0e0e0; font-size: 14px;
    }
    .auth-box input:focus { outline: none; border-color: #e74c3c; }
    .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #2a2d3e; }
    .auth-tab {
      flex: 1; padding: 10px; background: none; border: none; color: #888;
      cursor: pointer; font-size: 14px; transition: color 0.2s;
    }
    .auth-tab.active { color: #e74c3c; border-bottom: 2px solid #e74c3c; }
    #authError { color: #e74c3c; font-size: 13px; margin-top: 8px; min-height: 18px; }

    /* ── MAIN APP ── */
    #app { display: none; }
    header {
      background: #1a1d27; border-bottom: 1px solid #2a2d3e;
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; color: #fff; }
    header span { font-size: 13px; color: #888; }
    .logout-btn {
      padding: 6px 16px; background: #2a2d3e; border: none; border-radius: 6px;
      color: #e0e0e0; cursor: pointer; font-size: 13px;
    }
    .logout-btn:hover { background: #e74c3c; color: #fff; }

    main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 10px;
      padding: 20px; text-align: center;
    }
    .stat-card h2 { font-size: 32px; font-weight: 700; }
    .stat-card p { font-size: 12px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .red { color: #e74c3c; }
    .green { color: #2ecc71; }
    .orange { color: #f39c12; }
    .blue { color: #3498db; }

    /* controls */
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .btn {
      padding: 9px 18px; border: none; border-radius: 7px;
      cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-red { background: #e74c3c; color: #fff; }
    .btn-green { background: #2ecc71; color: #000; }
    .btn-purple { background: #8e44ad; color: #fff; }
    .btn-blue { background: #3498db; color: #fff; }

    /* charts */
    .charts { display: grid; grid-template-columns: 280px 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card {
      background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 10px; padding: 20px;
    }
    .chart-card h3 { font-size: 13px; color: #888; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }

    /* table */
    .table-wrap { background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #12151e; }
    th { padding: 12px 14px; font-size: 11px; color: #888; text-align: left; text-transform: uppercase; letter-spacing: 1px; }
    td { padding: 12px 14px; font-size: 13px; border-top: 1px solid #2a2d3e; }
    tr.fraud-row { background: rgba(231,76,60,0.08); }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-fraud { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .badge-safe { background: rgba(46,204,113,0.15); color: #2ecc71; }

    /* report modal */
    #reportModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
    }
    #reportModal.open { display: flex; }
    .modal-box {
      background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 12px;
      padding: 32px; max-width: 560px; width: 90%;
    }
    .modal-box h3 { color: #e74c3c; margin-bottom: 16px; }
    .modal-box p { line-height: 1.7; color: #ccc; font-size: 14px; }
    .modal-close {
      margin-top: 20px; padding: 8px 20px; background: #2a2d3e;
      border: none; border-radius: 6px; color: #e0e0e0; cursor: pointer;
    }

    button.btn { cursor: pointer; }
  </style>
</head>
<body>

<!-- ── AUTH SCREEN ─────────────────────────────────────── -->
<div id="authScreen">
  <div class="auth-box">
    <h1>🛡️ Fraud Detection</h1>
    <p>Sign in to access the monitoring dashboard</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>
    <input id="username" type="text" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button class="btn btn-red" style="width:100%;padding:12px;" onclick="handleAuth()">Continue</button>
    <div id="authError"></div>
  </div>
</div>

<!-- ── MAIN APP ────────────────────────────────────────── -->
<div id="app">
  <header>
    <h1>🚨 Fraud Detection Dashboard</h1>
    <span id="welcomeUser"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <main>
    <div class="stats">
      <div class="stat-card"><h2 id="sTotal" class="blue">0</h2><p>Total Transactions</p></div>
      <div class="stat-card"><h2 id="sFraud" class="red">0</h2><p>Fraud Detected</p></div>
      <div class="stat-card"><h2 id="sSafe" class="green">0</h2><p>Safe</p></div>
      <div class="stat-card"><h2 id="sRate" class="orange">0%</h2><p>Fraud Rate</p></div>
    </div>

    <div class="controls">
      <button class="btn btn-red" onclick="simulateAttack()">⚡ Simulate Attack</button>
      <button class="btn btn-green" onclick="loadData()">🔄 Refresh</button>
      <button class="btn btn-purple" onclick="loadFraudOnly()">🚨 Fraud Only</button>
      <button class="btn btn-blue" onclick="loadData()">📋 All Transactions</button>
    </div>

    <div class="charts">
      <div class="chart-card">
        <h3>Fraud vs Safe</h3>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Risk Score Distribution</h3>
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>User</th><th>Amount (₹)</th>
            <th>Location</th><th>Device</th><th>Risk Score</th>
            <th>Status</th><th>Report</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ── REPORT MODAL ────────────────────────────────────── -->
<div id="reportModal">
  <div class="modal-box">
    <h3>🔍 Investigation Report</h3>
    <p id="reportText"></p>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const API = "https://frauddetection-platform-production.up.railway.app"; // ← UPDATE THIS after deployment
  // For local dev use: const API = "http://127.0.0.1:8000";

  let token = localStorage.getItem("fraud_token") || "";
  let currentTab = "login";
  let pieChart, barChart;
  let lastReports = {};

  // ── AUTH ────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".auth-tab").forEach((t, i) => {
      t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
    });
  }

  async function handleAuth() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errEl = document.getElementById("authError");
    errEl.textContent = "";

    if (!username || !password) { errEl.textContent = "Please fill in both fields."; return; }

    try {
      if (currentTab === "register") {
        const res = await fetch(`${API}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.detail || "Registration failed."; return; }
        errEl.style.color = "#2ecc71";
        errEl.textContent = "Registered! Logging you in...";
        setTimeout(() => { switchTab("login"); handleAuth(); }, 800);
        return;
      }

      // Login
      const form = new URLSearchParams();
      form.append("username", username);
      form.append("password", password);
      const res = await fetch(`${API}/login`, { method: "POST", body: form });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.detail || "Login failed."; return; }

      token = data.access_token;
      localStorage.setItem("fraud_token", token);
      document.getElementById("authScreen").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("welcomeUser").textContent = `👤 ${username}`;
      loadData();
    } catch {
      errEl.textContent = "Cannot connect to server. Is it running?";
    }
  }

  function logout() {
    token = "";
    localStorage.removeItem("fraud_token");
    document.getElementById("authScreen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }

  function authHeaders() {
    return { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" };
  }

  // Auto-login if token exists
  window.onload = () => {
    if (token) {
      document.getElementById("authScreen").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadData();
    }
  };

  // ── DATA ────────────────────────────────────────────────
  async function loadData() {
    try {
      const [statsRes, txRes] = await Promise.all([
        fetch(`${API}/stats`, { headers: authHeaders() }),
        fetch(`${API}/transactions`, { headers: authHeaders() }),
      ]);
      if (statsRes.status === 401) { logout(); return; }
      const stats = await statsRes.json();
      const txns = await txRes.json();
      renderStats(stats);
      renderTable(txns);
      renderCharts(stats, txns);
    } catch { console.error("Load failed"); }
  }

  async function loadFraudOnly() {
    const res = await fetch(`${API}/fraud`, { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const txns = await res.json();
    renderTable(txns);
  }

  async function simulateAttack() {
    const res = await fetch(`${API}/simulate_attack`, { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    if (data.investigation_report) lastReports[data.id] = data.investigation_report;
    loadData();
  }

  // ── RENDER ──────────────────────────────────────────────
  function renderStats(s) {
    document.getElementById("sTotal").textContent = s.total_transactions;
    document.getElementById("sFraud").textContent = s.fraud_detected;
    document.getElementById("sSafe").textContent = s.safe_transactions;
    document.getElementById("sRate").textContent = s.fraud_rate_percent + "%";
  }

  function renderTable(txns) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    txns.forEach(tx => {
      const tr = document.createElement("tr");
      if (tx.flagged) tr.classList.add("fraud-row");
      const hasReport = !!lastReports[tx.id];
      tr.innerHTML = `
        <td>${tx.id}</td>
        <td>User ${tx.user_id}</td>
        <td>₹${Number(tx.amount).toLocaleString()}</td>
        <td>${tx.location}</td>
        <td style="font-size:11px;color:#888">${tx.device_id}</td>
        <td><b style="color:${tx.risk_score > 70 ? '#e74c3c' : '#2ecc71'}">${tx.risk_score}</b></td>
        <td><span class="badge ${tx.flagged ? 'badge-fraud' : 'badge-safe'}">${tx.flagged ? '🚨 FRAUD' : '✅ Safe'}</span></td>
        <td>${hasReport
          ? `<button class="btn btn-red" style="padding:4px 10px;font-size:11px" onclick="showReport(${tx.id})">View</button>`
          : '<span style="color:#444;font-size:11px">—</span>'}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderCharts(stats, txns) {
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById("pieChart"), {
      type: "doughnut",
      data: {
        labels: ["Safe", "Fraud"],
        datasets: [{ data: [stats.safe_transactions, stats.fraud_detected],
          backgroundColor: ["#2ecc71", "#e74c3c"], borderWidth: 0 }],
      },
      options: { plugins: { legend: { labels: { color: "#ccc" } } } },
    });

    const buckets = [0, 0, 0, 0, 0];
    txns.forEach(tx => { buckets[Math.min(Math.floor(tx.risk_score / 20), 4)]++; });
    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById("barChart"), {
      type: "bar",
      data: {
        labels: ["0–20", "20–40", "40–60", "60–80", "80–100"],
        datasets: [{ label: "Transactions", data: buckets,
          backgroundColor: ["#2ecc71","#f1c40f","#e67e22","#e74c3c","#8e44ad"],
          borderWidth: 0 }],
      },
      options: {
        scales: {
          x: { ticks: { color: "#888" }, grid: { color: "#2a2d3e" } },
          y: { ticks: { color: "#888" }, grid: { color: "#2a2d3e" }, beginAtZero: true },
        },
        plugins: { legend: { display: false } },
      },
    });
  }

  function showReport(id) {
    document.getElementById("reportText").textContent = lastReports[id] || "No report available.";
    document.getElementById("reportModal").classList.add("open");
  }
  function closeModal() { document.getElementById("reportModal").classList.remove("open"); }

  // Auto-refresh every 10 seconds
  setInterval(loadData, 10000);
</script>
</body>
</html>
